<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reyan's GK Quiz - Printable</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; background: #fff; color: #222; }

  /* SCREEN STYLES */
  .print-btn {
    position: fixed; top: 16px; right: 16px; z-index: 999;
    background: linear-gradient(135deg,#FF6B6B,#FF8E53);
    color: #fff; border: none; border-radius: 30px;
    padding: 12px 28px; font-size: 1rem; font-weight: bold;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 14px rgba(255,107,107,.5);
  }
  .print-btn:hover { transform: scale(1.05); }

  .cover {
    background: linear-gradient(135deg,#FF6B6B,#FF8E53,#FFC300);
    padding: 48px 30px; text-align: center; margin-bottom: 30px;
    border-radius: 0 0 40px 40px;
  }
  .cover h1 { font-size: 2.6rem; color: #fff; text-shadow: 2px 2px 6px rgba(0,0,0,0.2); }
  .cover h2 { font-size: 1.3rem; color: #fff; opacity: .9; margin-top: 8px; }
  .cover .stars { font-size: 2rem; margin: 12px 0 0; }

  .page-wrap { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; }

  /* CATEGORY HEADER */
  .cat-header {
    display: flex; align-items: center; gap: 14px;
    border-radius: 18px; padding: 14px 20px; margin: 28px 0 14px;
    color: #fff;
  }
  .cat-header .cat-icon { font-size: 2rem; }
  .cat-header .cat-title { font-size: 1.3rem; font-weight: 900; }
  .cat-header .cat-count { font-size: .85rem; opacity: .85; margin-top: 2px; }

  /* QUESTION GRID */
  .q-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  /* QUESTION CARD */
  .q-card {
    border-radius: 16px;
    padding: 14px 14px 12px;
    position: relative;
    border: 2px solid transparent;
    page-break-inside: avoid;
  }
  .q-num {
    position: absolute; top: 10px; right: 12px;
    font-size: .65rem; font-weight: 900; opacity: .45;
  }
  .q-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .q-em { font-size: 1.9rem; min-width: 34px; }
  .q-text { font-size: .82rem; font-weight: 700; color: #222; line-height: 1.4; flex: 1; }
  .q-ans {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.7); border-radius: 10px;
    padding: 6px 10px;
  }
  .q-ans .tick { font-size: .9rem; }
  .q-ans .ans-text { font-size: .78rem; font-weight: 700; color: #333; }

  /* FOOTER */
  .footer {
    text-align: center; margin-top: 40px; padding: 20px;
    border-top: 3px dashed #FFD700;
    font-size: .85rem; color: #888;
  }
  .footer b { color: #FF6B6B; }

  /* PAGE BREAK */
  .page-break { page-break-before: always; }

  /* PRINT STYLES */
  @media print {
    .print-btn { display: none !important; }
    body { background: #fff; }
    .cover { border-radius: 0; margin-bottom: 20px; padding: 30px 20px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .cat-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .q-card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .q-grid { gap: 8px; }
    .page-wrap { padding: 0 10px 20px; }
  }
</style>
</head>
<body>

const content = document.getElementById('content');
let html = '';
